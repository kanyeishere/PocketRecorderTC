name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2022
    defaults:
      run:
        shell: pwsh

    env:
      USE_MINIMAL_FFMPEG: true
      FFMPEG_REF: n8.1.2
      VIDEO_CODEC_SDK_12_URL: ${{ secrets.VIDEO_CODEC_SDK_12_URL || vars.VIDEO_CODEC_SDK_12_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Resolve version
        id: version
        run: |
          $version = "${{ github.ref_name }}"
          if ($version.StartsWith("v")) {
            $version = $version.Substring(1)
          }

          $parsedVersion = $null
          if (-not [System.Version]::TryParse($version, [ref]$parsedVersion)) {
            throw "Version '$version' is not a valid System.Version value. Use a tag like v1.0.0.0."
          }

          Write-Host "Resolved version: $version"
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT

      - name: Patch manifest version for package
        run: |
          $version = "${{ steps.version.outputs.version }}"
          Write-Host "Patching PocketRecorder.json to version $version for this release package"

          $manifest = Get-Content -Raw "PocketRecorder.json" | ConvertFrom-Json
          $manifest.AssemblyVersion = $version
          $manifest | ConvertTo-Json -Depth 10 | Set-Content "PocketRecorder.json"
          Write-Host "Updated PocketRecorder.json"

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Prepare NativeRecorder dependencies
        run: .\scripts\Prepare-NativeRecorderDeps.ps1

      - name: Build NativeRecorder
        run: |
          msbuild NativeRecorder\NativeRecorder.vcxproj `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:VideoCodecSdkDir="$env:NATIVE_RECORDER_VIDEO_CODEC_SDK_DIR" `
            /p:FfmpegRoot="$env:NATIVE_RECORDER_FFMPEG_ROOT" `
            /p:AmfSdkDir="$env:NATIVE_RECORDER_AMF_DIR" `
            /v:minimal

      - name: Build Plugin
        run: |
          $version = "${{ steps.version.outputs.version }}"
          dotnet build PocketRecorder.csproj --configuration Release `
            /p:Platform=x64 `
            /p:Version="$version" `
            /p:AssemblyVersion="$version" `
            /p:FileVersion="$version" `
            /p:InformationalVersion="$version" `
            /p:NativeRecorderFfmpegRoot="$env:NATIVE_RECORDER_FFMPEG_ROOT" `
            /p:NativeRecorderAutoBuild=false

      - name: Verify plugin assembly version
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $assemblyPath = "bin\x64\Release\PocketRecorder.dll"
          if (-not (Test-Path $assemblyPath)) {
            throw "Plugin assembly not found: $assemblyPath"
          }

          $actualVersion = [System.Reflection.AssemblyName]::GetAssemblyName($assemblyPath).Version.ToString()
          Write-Host "PocketRecorder.dll assembly version: $actualVersion"
          if ($actualVersion -ne $version) {
            throw "Plugin assembly version '$actualVersion' does not match release version '$version'."
          }

      - name: Verify packaged native files
        run: |
          $outputDir = "bin\x64\Release"
          $requiredFiles = @(
            "NativeRecorder.abi13.dll",
            "avformat-*.dll",
            "avcodec-*.dll",
            "avutil-*.dll",
            "swresample-*.dll"
          )
          foreach ($pattern in $requiredFiles) {
            $matches = @(Get-ChildItem $outputDir -Filter $pattern -File)
            if ($matches.Count -eq 0) {
              throw "Required native package file missing: $outputDir\$pattern"
            }
          }
          $legacyNativeDlls = @(Get-ChildItem $outputDir -Filter "NativeRecorder.abi13.nvenc*.dll" -File)
          if ($legacyNativeDlls.Count -ne 0) {
            throw "Legacy split NativeRecorder DLLs must not be packaged: $($legacyNativeDlls.Name -join ', ')"
          }

      - name: Package Plugin
        run: |
          $outputDir = "bin\x64\Release"
          if (-not (Test-Path $outputDir)) {
            throw "Build output directory not found: $outputDir"
          }
          Compress-Archive -Path "$outputDir\*" -DestinationPath "latest.zip" -Force
          if (-not (Test-Path "latest.zip")) { throw "latest.zip was not created!" }
          Write-Host "latest.zip created: $(Get-Item latest.zip | Select-Object Length)"

      - name: Generate pocketrecorder-entry.json
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $repoUrl = "${{ github.server_url }}/${{ github.repository }}"
          $downloadUrl = "$repoUrl/releases/latest/download/latest.zip"

          $entry = @{
            Author                 = "Wotou"
            Name                   = "Pocket Recorder"
            Punchline              = "一键录制 FFXIV 音画，支持 8 人副本倒计时自动开录。"
            Description            = "通过 D3D11捕获游戏原生画面。支持悬浮录制按钮、命令控制、可调 FPS/码率。支持 8 人副本倒计时自动录制，灭团、退出副本或登出会自动停录并保存。"
            InternalName           = "PocketRecorder"
            AssemblyVersion        = $version
            TestingAssemblyVersion = $version
            ApplicableVersion      = "any"
            Tags                   = @("recording", "capture", "video", "audio", "ffmpeg", "ffxiv")
            DalamudApiLevel        = 12
            IconUrl                = "https://raw.githubusercontent.com/kanyeishere/PocketRecorderTC/master/images/icon.png"
            RepoUrl                = $repoUrl
            DownloadLinkInstall    = $downloadUrl
            DownloadLinkTesting    = $downloadUrl
            DownloadLinkUpdate     = $downloadUrl
          }

          @($entry) | ConvertTo-Json -Depth 10 -AsArray | Set-Content "pocketrecorder-entry.json"
          Write-Host "=== pocketrecorder-entry.json ==="
          Get-Content "pocketrecorder-entry.json"

          if (-not (Test-Path "pocketrecorder-entry.json")) { throw "pocketrecorder-entry.json was not created!" }

      - name: Create Release & Upload Assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          $existing = gh release view "$tag" --json id 2>$null
          if ($existing) {
            Write-Host "Release $tag already exists, uploading additional assets..."
          } else {
            Write-Host "Creating new release $tag..."
            gh release create "$tag" `
              --title "$tag" `
              --generate-notes `
              --latest
          }

          Write-Host "Uploading latest.zip..."
          gh release upload "$tag" "latest.zip" --clobber

          Write-Host "Uploading pocketrecorder-entry.json..."
          gh release upload "$tag" "pocketrecorder-entry.json" --clobber

          Write-Host "All assets uploaded successfully."

      - name: Trigger manifest aggregation
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
        run: |
          if (-not $env:GH_TOKEN) {
            throw "DISPATCH_TOKEN secret is not set. Create a PAT with 'repo' scope and add it as DISPATCH_TOKEN in repo settings."
          }

          Write-Host "Sending repository_dispatch to PocketStationTC repo..."
          gh api `
            --method POST `
            /repos/kanyeishere/PocketStationTC/dispatches `
            -f event_type="aggregate-manifest" `
            -f 'client_payload[plugin]="PocketRecorder"' `
            -f "client_payload[version]=${{ steps.version.outputs.version }}"

          if ($LASTEXITCODE -ne 0) {
            throw "gh api failed with exit code $LASTEXITCODE. Check that DISPATCH_TOKEN has 'repo' scope."
          }
          Write-Host "repository_dispatch sent successfully."
